spring:
  application:
    name: api-gateway
  profiles:
    active: dev
  cloud:
    gateway:
      routes:

        #alerta
        - id: alertas-service
          uri: http://localhost:8080
          predicates:
            - Path=/api/alertas/**
          filters:
            - StripPrefix=1

        #documentos
        - id: documentos-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/documentos/**
          filters:
            - StripPrefix=1

        #exportaciones
        - id: exportaciones-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/exportaciones/**
          filters:
            - StripPrefix=1

        #historial
        - id: historial-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/historial/**
          filters:
            - StripPrefix=1

        #importaciones
        - id: importaciones-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/importaciones/**
          filters:
            - StripPrefix=1

        #impuestos
        - id: impuetos-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/impuestos/**
          filters:
            - StripPrefix=1

        #mercancia
        - id: mercancia-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/mercancia/**
          filters:
            - StripPrefix=1

        #paises
        - id: paises-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/paises/**
          filters:
            - StripPrefix=1

        #reportes
        - id: reportes-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/reportes/**
          filters:
            - StripPrefix=1

        #usuarios
        - id: usuarios-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/usuarios/**
          filters:
            - StripPrefix=1