services:

  # ── Base de datos MySQL compartida ───────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: mysql-aduanadonpepe
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: aduanadonpepe
      MYSQL_USER: aduana
      MYSQL_PASSWORD: aduana123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - aduana-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Microservicios ───────────────────────────────────────────────

  alertas:
    build:
      context: ./alertas
      dockerfile: Dockerfile
    container_name: ms-alertas
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_alertas?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: aduana
      SPRING_DATASOURCE_PASSWORD: aduana123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - aduana-net
    restart: unless-stopped

  documentos:
    build:
      context: ./documentos
      dockerfile: Dockerfile
    container_name: ms-documentos
    ports:
      - "8081:8080"
