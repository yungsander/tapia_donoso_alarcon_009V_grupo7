server:
  port: 8087

spring:
  application:
    name: paises
  datasource:
    url: jdbc:mysql://localhost:3306/db_paises?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: aduana
    password: aduana123
  jpa:
    hibernate:
      ddl-auto: none

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
